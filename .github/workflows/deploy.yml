name: Deploy to Server

on:
  push:
    branches:
      - main

# Avoid overlapping deploys; only the latest push matters.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: adriwin.fr
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            git config --global --get-all safe.directory | grep -Fxq /opt/bp-work-server || \
              git config --global --add safe.directory /opt/bp-work-server
            cd /opt/bp-work-server
            # Raise the maintenance curtain: nginx serves the static page while this exists.
            touch /opt/bp-work-server/maintenance.flag
            git fetch origin main
            git reset --hard origin/main
            # Reinstall in case dependencies or the package metadata changed.
            .venv/bin/pip install -e . --quiet
            # The service runs as bpwork; keep the tree owned by it.
            chown -R bpwork:bpwork /opt/bp-work-server
            systemctl restart bp-work-server.service
            # Wait for the app to actually answer before dropping the curtain.
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null http://127.0.0.1:8765/; then
                break
              fi
              sleep 1
            done
            # Lower the curtain (kept up if deploy failed earlier, thanks to set -e).
            rm -f /opt/bp-work-server/maintenance.flag
            systemctl --no-pager status bp-work-server.service | head -n 5
